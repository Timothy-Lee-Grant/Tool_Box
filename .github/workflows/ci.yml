# Plan 001, Step 6 — honest CI.
# Green here must MEAN something: real restore, real build with warnings fatal,
# real tests. Proven capable of going red before it earned the badge (Step 6.2).
name: CI

on: [push, pull_request]

# A newer push to the same branch cancels the stale run — no queue of zombie builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      # -warnaserror is belt-and-suspenders: Directory.Build.props already makes
      # compiler warnings fatal; this flag additionally makes MSBuild-level warnings fatal.
      - name: Build
        run: dotnet build --no-restore --configuration Release -warnaserror

      - name: Test
        run: dotnet test --no-build --configuration Release

  # Plan 002, Step 5: the image must build and BOOT on every push — a Dockerfile
  # that only builds is untested deployment code. No registry push yet (that rung
  # of the ladder needs versioning/tagging decisions; deliberately deferred).
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t toolbox:ci .

      - name: Smoke test — container boots and reports healthy
        run: |
          docker run -d --name toolbox -p 8080:8080 toolbox:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health; then
              echo
              echo "healthy after ~${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::server never became healthy"
          docker logs toolbox
          exit 1

      - name: Teardown
        if: always()
        run: docker rm -f toolbox 2>/dev/null || true
